schema_version: 1

context:
  name: pyvers
  version: "0.2.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/vmoens/pyvers/archive/v${{ version }}.tar.gz
  sha256: 7f4a3e5346d4eb97eedf78a088fee37c2ee044499b6742e37c0094d0f9c695d2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pyvers
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A Python library for managing multiple versions of dependencies
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/vmoens/pyvers

extra:
  recipe-maintainers:
    - jan-janssen
